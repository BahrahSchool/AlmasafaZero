<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المسافة صفر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #fcfcfd; 
            direction: rtl; 
            margin: 0; 
            overflow-x: hidden; 
        }
        .marquee-container { 
            width: 100%; 
            overflow: hidden; 
            background: #1e1b4b; 
            height: 54px; 
            display: flex; 
            align-items: center; 
            position: relative; 
        }
        .marquee-content { 
            display: flex; 
            white-space: nowrap; 
            animation: scroll-news 40s linear infinite; 
        }
        @keyframes scroll-news { 
            0% { transform: translateX(100%); } 
            100% { transform: translateX(-100%); } 
        }
        .news-badge { 
            position: absolute; 
            right: 0; 
            z-index: 50; 
            background: #4f46e5; 
            color: white; 
            padding: 0 25px; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            font-weight: 900; 
            font-size: 14px; 
            box-shadow: -10px 0 20px rgba(0,0,0,0.5); 
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .comment-bubble { background: #ffffff; border-radius: 12px; padding: 8px 12px; margin-bottom: 6px; border: 1px solid #f1f5f9; font-size: 13px; }
        .card-wrapper { overflow: visible !important; position: relative; }
        /* ميزة التكبير الفخمة */
        .media-zoom-overlay { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        // تم إصلاح السطر التالي بإضافة addDoc لضمان عمل التعليقات
        window.FB = { initializeApp, getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, arrayUnion, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
    </script>

    <script type="text/babel">
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { 
            apiKey: "AIzaSyDslMEStik2JmiKoQbnCcQT7ZcLg4cldDg",
            authDomain: "excellenceplatform-96336.firebaseapp.com",
            projectId: "excellenceplatform-96336",
            storageBucket: "excellenceplatform-96336.firebasestorage.app",
            messagingSenderId: "96997505418",
            appId: "1:96997505418:web:07ab652f31571a9c913073",
            measurementId: "G-58JFCF1KX1"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'excellence-pro-system';

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                award: <g fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="8" r="6"/><path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526"/></g>,
                megaphone: <path fill="none" stroke="currentColor" strokeWidth="2" d="m3 11 18-5v12L3 14v-3z"/>,
                send: <path fill="none" stroke="currentColor" strokeWidth="2" d="m22 2-7 20-4-9-9-4 20-7Z"/>,
                trophy: <path fill="none" stroke="currentColor" strokeWidth="2" d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6m12 5h1.5a2.5 2.5 0 0 0 0-5H18M12 22v-4m-7-2 1.5-9h11l1.5 9a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2z"/>,
                sparkles: <path fill="none" stroke="currentColor" strokeWidth="2" d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275 1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>,
                thumbsUp: <path fill="none" stroke="currentColor" strokeWidth="2" d="M7 10v11m1-11V7a4 4 0 0 1 4-4v0a4 4 0 0 1 4 4v3h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V10h2Z"/>,
                thumbsDown: <path fill="none" stroke="currentColor" strokeWidth="2" d="M17 14V3m-1 11v3a4 4 0 0 1-4 4v0a4 4 0 0 1-4-4v-3H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v5h-2Z"/>,
                close: <path fill="none" stroke="currentColor" strokeWidth="2" d="M18 6L6 18M6 6l12 12" />
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" className={className}>{icons[name] || <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="2" fill="none"/>}</svg>;
        };

        const schoolFullName = "ثانوية بحرة المجاهدين الثانية";

        const PostCard = ({ p, userActions, handleLike, handleDislike, commentValue, onCommentChange, onCommentSubmit, countChars, countNums, formatNum, onZoom }) => (
            <div className="card-wrapper bg-white rounded-[2.5rem] border shadow-sm flex flex-col group hover:shadow-xl transition-all duration-500 text-right h-full overflow-hidden font-black">
                {p.mediaData && (
                    <div className="h-48 overflow-hidden cursor-zoom-in relative" onClick={() => onZoom(p.mediaData)}>
                        {p.mediaData.startsWith('data:video/') ? (
                            <video src={p.mediaData} className="w-full h-full object-cover" />
                        ) : (
                            <img src={p.mediaData} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                        )}
                    </div>
                )}
                
                <div className={`absolute top-0 left-10 ${p.mediaData ? 'mt-40' : '-mt-8'} p-5 rounded-[2rem] shadow-2xl z-20 border-4 border-white ${p.type === 'مسابقة' ? 'bg-amber-400 text-slate-900' : 'bg-indigo-600 text-white'}`}>
                    <Icon name={p.type === 'مسابقة' ? "trophy" : "megaphone"} size={30}/>
                </div>
                <div className="p-10 pt-16 flex-1 flex flex-col font-black">
                    <h4 className="text-2xl font-black text-slate-900 mb-2 leading-tight">{p.title}</h4>
                    <div className="flex justify-between items-center mb-6">
                        <p className={`text-[11px] font-black px-3 py-1 rounded-lg italic ${p.type === 'مسابقة' ? 'bg-amber-50 text-amber-700' : 'bg-indigo-50 text-indigo-700'}`}>بواسطة: {p.authorName || p.author || 'إيمان الحربي'}</p>
                        <span className="text-[10px] font-bold text-slate-400">{new Date(p.createdAt).toLocaleDateString('ar-SA')}</span>
                    </div>
                    <p className="text-slate-600 text-sm flex-1 leading-relaxed mb-6 font-bold">{p.content}</p>
                    
                    <div className="flex items-center gap-4 mb-8 bg-slate-50 w-fit px-4 py-2 rounded-2xl border shadow-inner font-black">
                        <button 
                            onClick={() => handleLike(p.id, p.likes || 0, p.dislikes || 0)} 
                            className={`flex items-center gap-2 px-4 py-2 rounded-xl transition-all font-black ${userActions[p.id] === 'like' ? 'bg-emerald-50 text-emerald-600 border border-emerald-200' : 'text-slate-400 hover:bg-emerald-50'}`}
                        >
                            <Icon name="thumbsUp" size={18} /> <span className="text-sm font-black">{formatNum(p.likes || 0)}</span>
                        </button>
                        <button 
                            onClick={() => handleDislike(p.id, p.likes || 0, p.dislikes || 0)} 
                            className={`flex items-center gap-2 px-4 py-2 rounded-xl transition-all font-black ${userActions[p.id] === 'dislike' ? 'bg-rose-50 text-rose-600 border border-rose-200' : 'text-slate-400 hover:bg-rose-50'}`}
                        >
                            <Icon name="thumbsDown" size={18} /> <span className="text-sm font-black">{formatNum(p.dislikes || 0)}</span>
                        </button>
                    </div>

                    <div className="bg-slate-50 p-6 rounded-[2.5rem] border mt-4 shadow-inner">
                        <div className="space-y-2 mb-4 max-h-32 overflow-y-auto custom-scrollbar">
                            {(p.comments || []).map((c, i) => (
                                <div key={i} className="comment-bubble shadow-sm">
                                    <span className="text-[10px] font-black text-indigo-600 block mb-1 font-black">{c.author}</span>
                                    <p className="text-slate-700 leading-relaxed text-xs font-bold">{c.text}</p>
                                </div>
                            ))}
                        </div>

                        <div className="relative font-black">
                            <div className="flex gap-3">
                                <input 
                                    className={`flex-1 bg-white border rounded-2xl px-5 py-3 text-sm outline-none focus:ring-2 shadow-sm text-right transition-all font-black ${(countChars(commentValue) > 40 || countNums(commentValue) > 10) ? 'border-rose-500 ring-rose-500' : 'border-slate-200 ring-amber-500'}`} 
                                    placeholder="اكتب تعليقك..." 
                                    value={commentValue || ""}
                                    onChange={(e) => onCommentChange(p.id, e.target.value)}
                                />
                                <button 
                                    disabled={countChars(commentValue) > 40 || countNums(commentValue) > 10}
                                    onClick={() => onCommentSubmit(p.id)}
                                    className="bg-amber-500 text-white p-3.5 rounded-2xl shadow-lg hover:bg-slate-900 transition-all active:scale-95 disabled:bg-slate-300 font-black"
                                >
                                    <Icon name="send" size={18}/>
                                </button>
                            </div>
                            <div className="flex justify-between px-2 mt-2">
                                <span className={`text-[9px] font-bold ${countChars(commentValue) > 40 ? 'text-rose-500' : 'text-slate-400'}`}>
                                    الحروف: {countChars(commentValue)}/40
                                </span>
                                <span className={`text-[9px] font-bold ${countNums(commentValue) > 10 ? 'text-rose-500' : 'text-slate-400'}`}>
                                    الأرقام: {countNums(commentValue)}/10
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const initialPosts = [];
            const [posts, setPosts] = React.useState(initialPosts);
            const [userActions, setUserActions] = React.useState({});
            const [commentInputs, setCommentInputs] = React.useState({});
            const [user, setUser] = React.useState(null);
            const [isReady, setIsReady] = React.useState(false);
            const [zoomMedia, setZoomMedia] = React.useState(null);

            const countChars = (str) => (str || "").replace(/\s/g, '').length;
            const countNums = (str) => ((str || "").match(/\d/g) || []).length;
            const formatNumbers = (num) => num >= 1000 ? (num/1000).toFixed(1) + 'k' : num;

            const getDurationMs = (d) => {
                const map = { 'يوم': 86400000, 'يومان': 172800000, '3 أيام': 259200000, 'أسبوع': 604800000, 'أسبوعين': 1209600000 };
                return map[d] || Infinity;
            };

            React.useEffect(() => {
                const checkFB = setInterval(() => {
                    if (window.FB) {
                        clearInterval(checkFB);
                        initFirebase();
                    }
                }, 100);
                return () => clearInterval(checkFB);
            }, []);

            const initFirebase = async () => {
                const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = window.FB;
                const fbApp = initializeApp(firebaseConfig);
                const auth = getAuth(fbApp);
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                    else await signInAnonymously(auth);
                } catch (e) {}
                onAuthStateChanged(auth, (u) => { setUser(u); setIsReady(true); });
            };

            React.useEffect(() => {
                if (!user || !isReady) return;
                const { getFirestore, collection, onSnapshot } = window.FB;
                const db = getFirestore();
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'posts');
                
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const now = Date.now();
                    const fbPosts = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
                    const combined = [...initialPosts, ...fbPosts];
                    const filtered = combined.filter(p => {
                        if (!p.duration || !p.createdAt) return true;
                        const createdTime = new Date(p.createdAt).getTime();
                        return (now - createdTime) < getDurationMs(p.duration);
                    });
                    const unique = Array.from(new Map(filtered.map(p => [p.id, p])).values());
                    setPosts(unique.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)));
                });
                return () => unsubscribe();
            }, [user, isReady]);

            const handleLike = async (id, currentLikes, currentDislikes) => {
                const { getFirestore, doc, updateDoc } = window.FB;
                const db = getFirestore();
                const postRef = doc(db, 'artifacts', appId, 'public', 'data', 'posts', id);
                let newLikes = currentLikes;
                let newDislikes = currentDislikes;
                let nextAction = 'like';
                if (userActions[id] === 'like') { newLikes = Math.max(0, currentLikes - 1); nextAction = null; }
                else if (userActions[id] === 'dislike') { newLikes = currentLikes + 1; newDislikes = Math.max(0, currentDislikes - 1); }
                else { newLikes = currentLikes + 1; }
                try { await updateDoc(postRef, { likes: newLikes, dislikes: newDislikes }); } catch(e) {}
                setUserActions(prev => ({ ...prev, [id]: nextAction }));
            };

            const handleDislike = async (id, currentLikes, currentDislikes) => {
                const { getFirestore, doc, updateDoc } = window.FB;
                const db = getFirestore();
                const postRef = doc(db, 'artifacts', appId, 'public', 'data', 'posts', id);
                let newLikes = currentLikes;
                let newDislikes = currentDislikes;
                let nextAction = 'dislike';
                if (userActions[id] === 'dislike') { newDislikes = Math.max(0, currentDislikes - 1); nextAction = null; }
                else if (userActions[id] === 'like') { newDislikes = currentDislikes + 1; newLikes = Math.max(0, currentLikes - 1); }
                else { newDislikes = currentDislikes + 1; }
                try { await updateDoc(postRef, { likes: newLikes, dislikes: newDislikes }); } catch(e) {}
                setUserActions(prev => ({ ...prev, [id]: nextAction }));
            };

            const handleComment = async (id) => {
                const text = commentInputs[id];
                if (!text?.trim() || countChars(text) > 40 || countNums(text) > 10) return;
                const { getFirestore, doc, updateDoc, arrayUnion } = window.FB;
                try {
                    await updateDoc(doc(getFirestore(), 'artifacts', appId, 'public', 'data', 'posts', id), {
                        comments: arrayUnion({ author: "زائر", text: text.trim(), createdAt: new Date().toISOString() })
                    });
                } catch(e) {}
                setCommentInputs({...commentInputs, [id]: ""});
            };

            if (!isReady) return <div className="h-screen flex items-center justify-center font-black text-indigo-600 bg-slate-50 animate-pulse font-black">جاري الاتصال بـ المسافة صفر...</div>;

            return (
                <div className="min-h-screen flex flex-col relative font-black">
                    <header className="h-24 bg-white border-b px-8 flex items-center justify-between sticky top-0 z-50 shadow-sm backdrop-blur-md bg-white/90 font-black">
                        <div className="flex items-center gap-4 text-right">
                            <div className="bg-slate-950 p-3 rounded-2xl shadow-xl"><Icon name="award" className="text-amber-400" size={28} /></div>
                            <div className="flex items-center gap-2 font-black">
                                <span className="text-2xl font-black text-slate-900 tracking-tighter">المسافة</span>
                                <span className="bg-slate-950 text-amber-400 font-black px-3 py-1 rounded-xl text-xs uppercase tracking-widest">صفر</span>
                            </div>
                        </div>
                    </header>

                    <div className="bg-slate-900 text-white py-24 px-8 border-b-4 border-amber-500 relative overflow-hidden text-right font-black">
                        <div className="max-w-6xl mx-auto relative z-10 font-black">
                            <span className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/10 text-amber-400 text-[10px] font-black uppercase mb-6 tracking-widest font-black"><Icon name="sparkles" size={14} /> المنصة الإعلامية الرسمية</span>
                            <h3 className="text-4xl md:text-5xl font-black mb-6 leading-tight font-black">نصنع التميز، ونقرب <span className="text-amber-400 font-black">المسافات.</span></h3>
                            <p className="text-slate-400 text-lg max-w-2xl leading-relaxed font-bold font-black">نافذة الإبداع والتواصل الرسمية لطلاب {schoolFullName}.</p>
                        </div>
                        <div className="marquee-container mt-16 border-t border-white/10 font-black">
                            <div className="news-badge uppercase tracking-widest font-black">عاجل</div>
                            <div className="marquee-content font-black">
                                {posts.map((p, i) => (<span key={i} className="mx-12 text-sm font-medium flex items-center font-black"><span className="text-amber-400 ml-4 font-black">●</span> {p.title}</span>))}
                            </div>
                        </div>
                    </div>

                    <main className="max-w-7xl mx-auto p-12 space-y-32 flex-1 w-full text-right font-black">
                        <section>
                            <h3 className="text-3xl font-black text-slate-900 border-r-8 border-indigo-600 pr-5 mb-20 uppercase font-black">أحدث الإعلانات</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-y-24 gap-x-10 font-black">
                                {posts.filter(p => {
                                    const type = p.type?.trim();
                                    return type === 'إعلان' || type === 'إعلان عام';
                                }).map(p => (
                                    <PostCard key={p.id} p={p} userActions={userActions} handleLike={handleLike} handleDislike={handleDislike} commentValue={commentInputs[p.id]} onCommentChange={(id, v) => setCommentInputs({...commentInputs, [id]: v})} onCommentSubmit={handleComment} countChars={countChars} countNums={countNums} formatNum={formatNumbers} onZoom={setZoomMedia} />
                                ))}
                                {posts.filter(p => {
                                    const type = p.type?.trim();
                                    return type === 'إعلان' || type === 'إعلان عام';
                                }).length === 0 && <p className="text-center col-span-full py-10 text-slate-300 font-black italic font-black">لا توجد إعلانات حالياً.</p>}
                            </div>
                        </section>
                        <section>
                            <h3 className="text-3xl font-black text-slate-900 border-r-8 border-amber-400 pr-5 mb-20 uppercase font-black">المسابقات</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-y-24 gap-x-10 font-black">
                                {posts.filter(p => p.type?.trim() === 'مسابقة').map(p => (
                                    <PostCard key={p.id} p={p} userActions={userActions} handleLike={handleLike} handleDislike={handleDislike} commentValue={commentInputs[p.id]} onCommentChange={(id, v) => setCommentInputs({...commentInputs, [id]: v})} onCommentSubmit={handleComment} countChars={countChars} countNums={countNums} formatNum={formatNumbers} onZoom={setZoomMedia} />
                                ))}
                                {posts.filter(p => p.type?.trim() === 'مسابقة').length === 0 && <p className="text-center col-span-full py-10 text-slate-300 font-black italic font-black">لا توجد مسابقات حالياً.</p>}
                            </div>
                        </section>
                    </main>

                    <footer className="bg-slate-950 text-white py-12 px-8 mt-20 border-t-4 border-amber-500 text-center relative overflow-hidden font-black">
                        <div className="max-w-7xl mx-auto space-y-3 relative z-10 font-black">
                             <div className="flex items-center justify-center gap-3 font-black">
                                <div className="bg-white/10 p-2 rounded-xl border border-white/5 font-black">
                                    <Icon name="award" className="text-amber-400 font-black" size={24} />
                                </div>
                                <span className="text-2xl font-black tracking-tighter font-black">المسافة <span className="text-amber-400 font-black">صفر</span></span>
                             </div>
                             <p className="text-slate-400 text-sm font-bold font-black">المنصة الإعلامية الرسمية لمدرسة {schoolFullName}</p>
                             <p className="text-slate-500 text-[11px] font-black uppercase tracking-[0.2em] pt-4 font-black">جميع الحقوق محفوظة © 2024</p>
                        </div>
                    </footer>

                    {zoomMedia && (
                        <div className="fixed inset-0 z-[1000] flex items-center justify-center p-6 media-zoom-overlay font-black" onClick={() => setZoomMedia(null)}>
                            <button className="absolute top-10 right-10 text-white hover:text-amber-400 transition-colors bg-white/10 p-4 rounded-full font-black" onClick={() => setZoomMedia(null)}>
                                <Icon name="close" size={32} />
                            </button>
                            <div className="max-w-5xl w-full max-h-[85vh] flex items-center justify-center animate-in zoom-in-95 duration-300 font-black" onClick={e => e.stopPropagation()}>
                                {zoomMedia.startsWith('data:video/') ? (
                                    <video src={zoomMedia} controls autoPlay className="max-w-full max-h-[85vh] rounded-[2rem] shadow-2xl border-4 border-white/20 font-black" />
                                ) : (
                                    <img src={zoomMedia} className="max-w-full max-h-[85vh] object-contain rounded-[2rem] shadow-2xl border-4 border-white/20 font-black" />
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
